meters:
- name: active_licensed_users
  description: Unique licenses that validate within the billing period; the primary Cloud pricing metric.
  unit: users
  aggregation: max
  dimensions:
  - account
  - product
  - policy
- name: subscription_tier
  description: The Cloud tier (Dev / Std / Ent) that ALU volume and feature needs place the account in.
  unit: tier
  aggregation: latest
  dimensions:
  - account
- name: releases_published
  description: Product releases published for distribution; capped on lower tiers.
  unit: releases
  aggregation: sum
  dimensions:
  - account
  - product
- name: distribution_egress
  description: Artifact download/distribution bandwidth (informational; relevant to self-hosted infra cost).
  unit: bytes
  aggregation: sum
  dimensions:
  - account
  - release
- name: self_hosted_license
  description: Flat-rate Keygen EE license, or zero-cost CE, for self-hosted deployments.
  unit: license
  aggregation: latest
  dimensions:
  - deployment
principles:
- name: Visibility
  description: Track active licensed users over time and map them to the Cloud tier band you are billed in.
- name: Allocation
  description: Tag licenses and policies per product/customer segment to attribute ALU-driven spend to cost centers.
- name: Optimization
  description: Prune stale/expired licenses that still count as ALUs, right-size the tier, and evaluate self-hosted CE/EE when ALU volume makes flat-rate cheaper than per-ALU Cloud.
- name: Accountability
  description: Assign owners per product line; review ALU trend and tier fit monthly against budget and growth.
