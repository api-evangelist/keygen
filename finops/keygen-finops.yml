description: >-
  FinOps view of Keygen spend. Keygen Cloud is a subscription service billed
  primarily on active licensed users (ALUs) - unique licenses that validate in
  a billing period - with tier-based feature gating (Software Licensing API on
  every tier, Distribution API on Std and above) and enterprise add-ons (SLA,
  SSO, audit logs). Self-hosted Keygen CE carries no license fee (infra cost
  only); Keygen EE is a flat-rate self-hosted license. The dominant cost driver
  on Cloud is ALU growth, so cost control centers on how licenses are modeled
  and which tier that ALU volume lands in.
notes: >-
  Keygen bills per active licensed user per period, not per API request; API
  usage is governed by rate limits rather than metered charges. Verify tier
  boundaries and ALU definitions against the pricing page during reconciliation.
