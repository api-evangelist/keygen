aid: keygen
url: https://raw.githubusercontent.com/api-evangelist/keygen/refs/heads/main/apis.yml
name: Keygen
kind: company
description: Keygen is a software licensing, entitlements, and distribution API for
  desktop, on-prem, IoT, and other installed applications. It issues license keys,
  activates and tracks machines, enforces policy-based entitlements, and distributes
  releases and artifacts for auto-updates. Keygen ships as the source-available,
  self-hostable Keygen CE / EE and as the managed Keygen Cloud, exposing a JSON:API
  interface under api.keygen.sh.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Software Licensing
- Entitlements
- License Keys
- Machine Activation
- Distribution
- Auto-Update
created: '2026-07-01'
modified: '2026-07-01'
specificationVersion: '0.19'
apis:
- aid: keygen:keygen-licenses-api
  name: Keygen Licenses API
  tags:
  - Licenses
  - License Keys
  - Validation
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://keygen.sh/docs/api/licenses/
  baseURL: https://api.keygen.sh/v1/accounts/{account}
  properties:
  - url: https://keygen.sh/docs/api/licenses/
    type: Documentation
  - url: https://keygen.sh/docs/api/licenses/
    type: APIReference
  - url: openapi/keygen-openapi.yml
    type: OpenAPI
  description: Create, retrieve, update, delete, suspend, reinstate, and renew license
    keys; validate a license key by ID or key, and check licenses out or in for
    offline use. JSON:API over application/vnd.api+json.
- aid: keygen:keygen-machines-activation-api
  name: Keygen Machines / Activation API
  tags:
  - Machines
  - Activation
  - Fingerprint
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://keygen.sh/docs/api/machines/
  baseURL: https://api.keygen.sh/v1/accounts/{account}
  properties:
  - url: https://keygen.sh/docs/api/machines/
    type: Documentation
  - url: openapi/keygen-openapi.yml
    type: OpenAPI
  description: Activate a machine against a license by hardware fingerprint, list and
    manage activated machines, send heartbeat pings to keep node-locked activations
    alive, and check machines out or in for offline activation.
- aid: keygen:keygen-policies-api
