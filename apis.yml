  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://keygen.sh/docs/api/policies/
  baseURL: https://api.keygen.sh/v1/accounts/{account}
  properties:
  - url: https://keygen.sh/docs/api/policies/
    type: Documentation
  - url: openapi/keygen-openapi.yml
    type: OpenAPI
  description: Define the licensing model - expiration, machine and core limits,
    floating vs node-locked, check-in cadence, encryption and cryptographic scheme,
    and overage strategy - that governs the licenses derived from a policy.
